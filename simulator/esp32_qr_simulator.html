<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Màn hình ESP32 E-ink</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
      body {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          background-color: #e0e5ec;
          font-family: monospace;
          margin: 0;
      }

      /* Vỏ thiết bị */
      .device-casing {
          background: #333;
          padding: 20px;
          border-radius: 12px;
          box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
          position: relative;
      }

      /* Màn hình E-ink thực tế */
      .e-ink-screen {
          width: 280px;
          height: 380px;
          background-color: #f7f9fa;
          border: 2px solid #999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: space-between;
          padding: 20px 10px;
          box-sizing: border-box;
      }

      .title {
          font-size: 24px;
          font-weight: bold;
          color: #000;
          text-transform: uppercase;
          border-bottom: 2px solid #000;
          padding-bottom: 5px;
          width: 80%;
          text-align: center;
      }

      #qrcode {
          margin: auto 0;
          padding: 10px;
          background: #fff;
      }

      .status-text {
          font-size: 12px;
          color: #333;
          text-align: center;
          word-wrap: break-word;
          max-width: 90%;
      }

      /* Đèn LED ảo */
      .led {
          position: absolute;
          top: 15px;
          right: 20px;
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background-color: #ff4757;
          box-shadow: 0 0 5px #ff4757;
      }

      .led.connected {
          background-color: #2ed573;
          box-shadow: 0 0 8px #2ed573;
      }
  </style>
</head>
<body>

<div class="device-casing">
  <div id="led" class="led"></div>
  <div class="e-ink-screen">
    <div class="title" id="table-name">BÀN 01</div>

    <div id="qrcode"></div>

    <div class="status-text" id="status">Đang khởi động...</div>
  </div>
</div>

<script>
  // --- CẤU HÌNH THIẾT BỊ ---
  const HARDWARE_ID = '92:c8:97:86:cc:ec';  // Thay đổi nếu cần, phải khớp với Database
  const MQTT_BROKER = 'ws://localhost:9001'; // Dùng ws:// cho trình duyệt
  const TOPIC = `r/tables/${HARDWARE_ID}/qr`;

  const statusEl = document.getElementById('status');
  const ledEl = document.getElementById('led');
  const qrContainer = document.getElementById('qrcode');

  // Khởi tạo khung QR Code
  const qrcode = new QRCode(qrContainer, {
    text: 'waiting...',
    width: 200,
    height: 200,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H,
  });

  // --- KẾT NỐI MQTT ---
  statusEl.innerText = 'Đang kết nối MQTT...';
  const client = mqtt.connect(MQTT_BROKER);

  client.on('connect', () => {
    ledEl.classList.add('connected');
    statusEl.innerText = 'Sẵn sàng nhận dữ liệu';

    // Đăng ký nhận tin nhắn
    client.subscribe(TOPIC, (err) => {
      if (err) console.e('Lỗi subscribe:', err);
    });
  });

  client.on('message', (topic, payload) => {
    const url = payload.toString();

    // Xóa QR cũ và tạo QR mới với URL nhận được
    qrcode.clear();
    qrcode.makeCode(url);

    // Hiển thị một phần URL ra màn hình để debug
    const token = new URLSearchParams(url.split('?')[1]).get('token');
    statusEl.innerText = `Token hiện tại: ${token || 'N/A'}`;

    // Hiệu ứng nháy màn hình giả lập e-ink
    qrContainer.style.opacity = '0.3';
    setTimeout(() => qrContainer.style.opacity = '1', 200);
  });

  client.on('offline', () => {
    ledEl.classList.remove('connected');
    statusEl.innerText = 'Mất kết nối tới Server!';
  });
</script>

</body>
</html>
