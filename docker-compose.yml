version: '3.9'
services:
  postgres:
    #    image: postgres:16
    #    environment:
    #      POSTGRES_USER: pos
    #      POSTGRES_PASSWORD: 12345
    #      POSTGRES_DB: posdb
    image: postgres:16
    env_file:
      - .env

    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - "5050:80"
    env_file:
      - .env
    depends_on:
      - postgres

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    env_file:
      - .env
    environment:
      MEILI_NO_ANALYTICS: "true"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
